<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь астрономических событий</title>
    <link rel="icon" href="image/favic.png" type="image/x-icon">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background-color: #ffffff;
    color: #333;
    line-height: 1.5;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

.header {
    height: auto;
    min-height: 96px;
}

.header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    padding: 10px 0;
}

.logo img {
    width: 120px;
    height: auto;
    margin-left: 10px;
    margin-top: 5px;
}

.title-header {
    font-size: 12px;
    max-width: 200px;
    text-align: center;
    margin-right: 10px;
    margin-top: 5px;
}

hr {
    border: none;
    background-color: rgb(0, 0, 0);
    height: 1.5px;
    margin: 10px 0;
}

nav {
    display: flex;
    justify-content: center;
    padding: 10px 0;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.nav-links a {
    font-size: 14px;
    color: #000000;
    text-decoration: none;
    padding: 5px 10px;
    transition: color 0.3s ease;
    outline: none;
}

.nav-links a:focus {
    outline: none;
}

.nav-links a.active {
    color: #201767;
    font-weight: 600;
}

.nav-links a:active {
    outline: none;
    border: none;
}

.nav-links a:focus-visible {
    outline: 2px solid #9D86CA;
    outline-offset: 2px;
}

.show-past-btn {
    display: block;
    margin: 20px auto;
    padding: 10px 25px;
    background: white;
    color: #201767;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    transition: all 0.3s;
    text-align: center;
}

.show-past-btn:hover {
    transform: translateY(-5px);
}

.past-event-card {
    display: flex;
    gap: 30px;
    background: #f5f5f5;
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 20px;
    transition: transform 0.3s;
    cursor: pointer;
    border: 2px solid #ddd;
    text-decoration: none;
    color: inherit;
    opacity: 0.8;
}

.past-event-card:hover {
    transform: translateY(-5px);
    border-color: #999;
    opacity: 1;
}

.past-event-card .event-date {
    color: #888;
}

.past-events-section {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 2px solid #eee;
}

.past-events-title {
    font-size: 24px;
    color: #666;
    margin-bottom: 20px;
    font-weight: 500;
}

.hidden-past {
    display: none;
}
@media (max-width: 768px) {
    
    .past-event-card {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    
    .show-past-btn {
        width: 100%;
        margin: 20px auto;
    }
}

.calendar-page {
    padding: 40px 0;
}

.page-title {
    font-size: 36px;
    color: #000;
    text-align: center;
    margin-bottom: 40px;
    font-weight: 600;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 40px;
}

.tab-btn {
    padding: 12px 30px;
    font-size: 18px;
    border: none;
    background: transparent;
    color: #666;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.3s;
    text-decoration: none;
}

.tab-btn.active {
    color: #201767;
    border-bottom-color: #201767;
    font-weight: 600;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

.events-list {
    max-width: 800px;
    margin: 0 auto;
}

.event-card {
    display: flex;
    gap: 30px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 20px;
    transition: transform 0.3s;
    cursor: pointer;
    border: 2px solid transparent;
    text-decoration: none;
    color: inherit;
}

.event-card:hover {
    transform: translateY(-7px);
    border-color: #201767;
}

.event-image {
    width: 150px;
    height: 150px;
    border-radius: 15px;
    overflow: hidden;
    flex-shrink: 0;
}

.event-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.event-info {
    flex: 1;
}

.event-info h3 {
    font-size: 24px;
    color: #000;
    margin-bottom: 10px;
    font-weight: 600;
}

.event-date {
    font-size: 16px;
    color: #201767;
    margin-bottom: 8px;
    font-weight: 500;
}

.event-short-desc {
    font-size: 16px;
    color: #666;
    line-height: 1.6;
}

.calendar-container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border-radius: 30px;
    padding: 30px;
    
}

.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.calendar-nav-btn {
    background: #f5f5f5;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.3s;
    color: #333;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.calendar-nav-btn:hover {
    background: #201767;
    color: white;
}

.current-month {
    font-size: 24px;
    font-weight: 600;
}

.calendar-table {
    width: 100%;
    border-collapse: collapse;
}

.calendar-table th {
    padding: 15px;
    font-weight: 600;
    color: #666;
    font-size: 16px;
}

.calendar-table td {
    border: 1px solid #f0f0f0;
    padding: 10px;
    vertical-align: top;
    min-height: 100px;
    transition: background-color 0.3s;
}

.calendar-table td.has-events {
    background-color: #201767;
    color: #ffffff;
    cursor: pointer;
}

.calendar-table td.has-events:hover {
    background-color: #655bb6;
}

.calendar-table td.today {
    border: 2px solid #201767;
}

.calendar-day {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 5px;
}

.events-preview {
    display: none;
    position: absolute;
    background: white;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
    z-index: 10;
    min-width: 200px;
}

.calendar-table td.has-events {
    position: relative;
}

.calendar-table td.has-events:hover .events-preview {
    display: block;
}

.event-mini-card {
    padding: 8px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background-color 0.3s;
}

.event-mini-card:last-child {
    border-bottom: none;
}

.event-mini-card:hover {
    background-color: #f8f7fc;
}

.event-mini-title {
    font-size: 14px;
    font-weight: 600;
    color: #000;
    margin-bottom: 3px;
}

.event-mini-time {
    font-size: 12px;
    color: #201767;
}

footer {
    background-color: #000000;
    color: white;
    padding: 40px 0;
    margin-top: 100px;
}

.footer-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}

.footer-links a {
    color: white;
    text-decoration: none;
    margin-right: 10px;
    transition: color 0.3s;
    font-size: 14px;
}

.footer-links a:hover {
    color: #9D86CA;
}

.footer-info {
    text-align: right;
    font-size: 13px;
}

@media (max-width: 768px) {
    .header-top {
        flex-direction: column;
        text-align: center;
        gap: 10px;
    }
    
    .logo img {
        margin: 0 auto;
        float: none;
        width: 140px;
    }
    
    .title-header {
        float: none;
        margin: 0 auto;
        max-width: 100%;
        font-size: 11px;
    }
    
    .nav-links {
        flex-direction: column;
        gap: 10px;
        width: 100%;
    }
    
    .nav-links a {
        margin: 0;
        padding: 8px;
        text-align: center;
        border: none;
        border-radius: 0;
        background-color: transparent;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .event-card {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    
    .event-image {
        width: 200px;
        height: 200px;
    }
    
    .calendar-header {
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
    }
    
    .calendar-table th,
    .calendar-table td {
        padding: 5px;
        font-size: 14px;
    }
    
    .footer-content {
        flex-direction: column;
        text-align: center;
    }
    
    .footer-info {
        text-align: center;
    }
}

@media (max-width: 480px) {
    .header {
        padding: 5px 0;
    }
    
    .logo img {
        width: 100px;
    }
    
    .title-header {
        font-size: 10px;
    }
    
    .page-title {
        font-size: 28px;
    }
    
    .tabs {
        gap: 10px;
    }
    
    .tab-btn {
        padding: 10px 20px;
        font-size: 16px;
    }
    
    .calendar-container {
        padding: 15px;
    }
    
    .calendar-table th,
    .calendar-table td {
        padding: 3px;
        font-size: 12px;
    }
    
    .calendar-day {
        font-size: 14px;
    }
}

@media (hover: none) and (pointer: coarse) {
    .nav-links a {
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .tab-btn,
    .calendar-nav-btn {
        min-height: 44px;
    }
}
    </style>
</head>
<body>

    <header class="header">
        <div class="header-top">
            <div class="logo"><a href="index.html"><img src="image/logo.png" alt="logo"></a></div>
            <div class="title-header">Познавай Вселенную — твой путь к звёздам начинается здесь</div>
        </div>
        <hr>

        <nav>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="courses.html">Курсы</a>
                <a href="calendar.html" class="active">Календарь событий</a>
                <a href="cabinet.html">Личный кабинет</a>
            </div>
        </nav>
    </header>

    <section class="calendar-page">
        <div class="container">
            <h1 class="page-title">Астрономический календарь</h1>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="events">События</button>
                <button class="tab-btn" data-tab="calendar">Календарь</button>
            </div>
            
            <!-- Секция События -->
            <div class="tab-content active" id="events-tab">
                <div class="events-list">
                    <div id="upcomingEventsContainer"></div>
                    
                    <button class="show-past-btn" id="togglePastEventsBtn">
                        Показать прошедшие события ↓
                    </button>
                    
                    <div id="pastEventsContainer" class="past-events-section hidden-past">
                        <h3 class="past-events-title">Прошедшие события</h3>
                        <div id="pastEventsList"></div>
                    </div>
                </div>
            </div>
            
            <!-- Секция Календарь -->
            <div class="tab-content" id="calendar-tab">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button class="calendar-nav-btn" id="prevMonthBtn">←</button>
                        <span class="current-month" id="currentMonthDisplay"></span>
                        <button class="calendar-nav-btn" id="nextMonthBtn">→</button>
                    </div>
                    <div id="calendarGrid"></div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="#">Обработка персональных данных</a>
                </div>
                <div class="footer-info">
                    <p>+7 (000) 000-00-00 | astro@site.ru</p>
                    <p>ИП Якунина Анастасия Александровна | ИНН 111 222 333 444</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
    const eventsData = [
        {
            id: 1,
            title: "Комета C/2025 R3 (PANSTARRS)",
            short_description: "Возможно, самая яркая комета 2026 года. Ее звездная величина составит около 7,7.",
            full_description: "25 апреля комета C/2025 R3 (PANSTARRS) достигнет максимальной яркости.",
            event_date: "2026-04-25",
            main_image: "image/25_04.jpg"
        },
        {
            id: 2,
            title: "Голубое микролуние",
            short_description: "Самая маленькая луна в году. Второе полнолуние календарного месяца.",
            full_description: "31 мая на ночном небе можно будет увидеть Голубую Луну.",
            event_date: "2026-05-31",
            main_image: "image/31_05.jpg"
        },
        {
            id: 3,
            title: "Венера рядом с Юпитером",
            short_description: "Две ярчайшие планеты сойдутся в созвездии Близнецов.",
            full_description: "9 июня Венера и Юпитер сойдутся в созвездии Близнецов.",
            event_date: "2026-06-09",
            main_image: "image/09_06.jpg"
        },
        {
            id: 4,
            title: "Луна рядом с Марсом и Плеядами",
            short_description: "Тонкий серп Луны рядом с Марсом и звездным скоплением Плеяды.",
            full_description: "11 июля на предрассветном небе вы увидите тонкий серп Луны рядом с Марсом и Плеядами.",
            event_date: "2026-07-11",
            main_image: "image/11_07.png"
        },
        {
            id: 5,
            title: "Большой парад планет",
            short_description: "Шесть планет выстроятся в линию от востока до юго-запада.",
            full_description: "Перед рассветом в небе будет виден парад шести планет.",
            event_date: "2026-08-12",
            main_image: "image/12_08_01.jpg"
        },
        {
            id: 6,
            title: "Полное солнечное затмение",
            short_description: "Луна полностью перекроет солнечный диск.",
            full_description: "Полное солнечное затмение — силуэт Луны полностью перекрывает солнечный диск.",
            event_date: "2026-08-12",
            main_image: "image/12_08_02.webp"
        },
        {
            id: 7,
            title: "Пик Персеид",
            short_description: "Самый популярный метеорный поток года.",
            full_description: "Пик активности Персеид ожидается 12–13 августа.",
            event_date: "2026-08-12",
            main_image: "image/12_08_03.jpg"
        },
        {
            id: 8,
            title: "Кровавая Луна (полное лунное затмение)",
            short_description: "Луна пройдет через тень Земли и приобретет красноватый оттенок.",
            full_description: "В ночь на 3 марта 2026 года состоится полное лунное затмение — «Кровавая Луна».",
            event_date: "2026-03-03",
            main_image: "image/03_03.jpg"
        }
    ];
    
    const today = new Date();
    let currentDisplayMonth = today.getMonth();
    let currentDisplayYear = today.getFullYear();
    let isUpdating = false;
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }
    
    function getUpcomingEvents() {
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        return eventsData.filter(event => new Date(event.event_date) >= now)
            .sort((a, b) => new Date(a.event_date) - new Date(b.event_date));
    }
    
    function getPastEvents() {
        const now = new Date();
        now.setHours(0, 0, 0, 0);
        return eventsData.filter(event => new Date(event.event_date) < now)
            .sort((a, b) => new Date(b.event_date) - new Date(a.event_date));
    }
    
    function renderUpcomingEvents() {
        const container = document.getElementById('upcomingEventsContainer');
        if (!container) return;
        
        const upcomingEvents = getUpcomingEvents();
        
        if (upcomingEvents.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: #666; padding: 30px;">Ближайших событий нет</p>';
            return;
        }
        
        container.innerHTML = upcomingEvents.map(event => `
        <a href="event_detail.html" style="text-decoration: none;">
            <div class="event-card" data-event-id="${event.id}">
                <div class="event-image">
                    <img src="${escapeHtml(event.main_image)}" alt="${escapeHtml(event.title)}">
                </div>
                <div class="event-info">
                    <h3>${escapeHtml(event.title)}</h3>
                    <div class="event-date">${formatDate(event.event_date)}</div>
                    <p class="event-short-desc">${escapeHtml(event.short_description)}</p>
                </div>
            </div>
        </a>
        `).join('');
        
        document.querySelectorAll('#upcomingEventsContainer .event-card').forEach(card => {
            card.addEventListener('click', () => {
                const eventId = card.getAttribute('data-event-id');
                window.location.href = `event_detail.html?id=${eventId}`;
            });
        });
    }
    
    function renderPastEvents() {
        const container = document.getElementById('pastEventsList');
        if (!container) return;
        
        const pastEvents = getPastEvents();
        
        if (pastEvents.length === 0) {
            container.innerHTML = '<p style="text-align: center; color: #666; padding: 30px;">Нет прошедших событий</p>';
            return;
        }
        
        container.innerHTML = pastEvents.map(event => `
            <div class="past-event-card" data-event-id="${event.id}">
                <div class="event-image">
                    <img src="${escapeHtml(event.main_image)}" alt="${escapeHtml(event.title)}">
                </div>
                <div class="event-info">
                    <h3>${escapeHtml(event.title)}</h3>
                    <div class="event-date">${formatDate(event.event_date)}</div>
                    <p class="event-short-desc">${escapeHtml(event.short_description)}</p>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('#pastEventsList .past-event-card').forEach(card => {
            card.addEventListener('click', () => {
                const eventId = card.getAttribute('data-event-id');
                window.location.href = `event_detail.html?id=${eventId}`;
            });
        });
    }
    
    function generateCalendar(month, year) {
        const firstDay = new Date(year, month, 1);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const startDayOfWeek = firstDay.getDay();
        let startOffset = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
        
        const eventsThisMonth = eventsData.filter(event => {
            const eventDate = new Date(event.event_date);
            return eventDate.getMonth() === month && eventDate.getFullYear() === year;
        });
        
        const eventsByDay = {};
        eventsThisMonth.forEach(event => {
            const day = new Date(event.event_date).getDate();
            if (!eventsByDay[day]) eventsByDay[day] = [];
            eventsByDay[day].push(event);
        });
        
        let calendarHtml = '<table class="calendar-table">';
        calendarHtml += '<thead><tr><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th><th>Вс</th></tr></thead>';
        calendarHtml += '<tbody>';
        
        let currentDay = 1;
        const todayDate = new Date();
        const isCurrentMonth = (todayDate.getMonth() === month && todayDate.getFullYear() === year);
        const todayDay = todayDate.getDate();
        
        for (let row = 0; row < 6; row++) {
            if (currentDay > daysInMonth) break;
            calendarHtml += '<tr>';
            for (let col = 0; col < 7; col++) {
                if (row === 0 && col < startOffset) {
                    calendarHtml += '<td class="empty"></td>';
                } else if (currentDay > daysInMonth) {
                    calendarHtml += '<td class="empty"></td>';
                } else {
                    const hasEvents = eventsByDay[currentDay] && eventsByDay[currentDay].length > 0;
                    let classNames = '';
                    if (hasEvents) classNames = 'has-events';
                    if (isCurrentMonth && currentDay === todayDay) classNames += ' today';
                    
                    calendarHtml += `<td class="${classNames}" data-day="${currentDay}">`;
                    calendarHtml += `<div class="calendar-day">${currentDay}</div>`;
                    
                    if (hasEvents) {
                        calendarHtml += '<div class="events-preview">';
                        eventsByDay[currentDay].forEach(event => {
                            calendarHtml += `
                                <div class="event-mini-card" data-event-id="${event.id}">
                                    <div class="event-mini-title">${escapeHtml(event.title)}</div>
                                </div>
                            `;
                        });
                        calendarHtml += '</div>';
                    }
                    
                    calendarHtml += '</td>';
                    currentDay++;
                }
            }
            calendarHtml += '</tr>';
        }
        
        calendarHtml += '</tbody></table>';
        return calendarHtml;
    }
    
    function updateCalendar() {
        if (isUpdating) return;
        isUpdating = true;
        
        const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
        const monthDisplay = document.getElementById('currentMonthDisplay');
        const calendarGrid = document.getElementById('calendarGrid');
        
        if (monthDisplay) monthDisplay.textContent = `${monthNames[currentDisplayMonth]} ${currentDisplayYear}`;
        if (calendarGrid) calendarGrid.innerHTML = generateCalendar(currentDisplayMonth, currentDisplayYear);
        
        setTimeout(() => {
            document.querySelectorAll('.event-mini-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const eventId = this.getAttribute('data-event-id');
                    if (eventId) window.location.href = `event_detail.html?id=${eventId}`;
                });
            });
            
            document.querySelectorAll('.calendar-table td.has-events').forEach(td => {
                td.addEventListener('click', function(e) {
                    if (!e.target.closest('.events-preview')) {
                        const preview = this.querySelector('.events-preview');
                        if (preview) {
                            const firstEvent = preview.querySelector('.event-mini-card');
                            if (firstEvent) {
                                const eventId = firstEvent.getAttribute('data-event-id');
                                if (eventId) window.location.href = `event_detail.html?id=${eventId}`;
                            }
                        }
                    }
                });
            });
            isUpdating = false;
        }, 10);
    }
    
    function init() {
        renderUpcomingEvents();
        renderPastEvents();
        updateCalendar();
        
        // Переключение вкладок
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(tab => {
            tab.addEventListener('click', function(e) {
                e.preventDefault();
                const tabId = this.getAttribute('data-tab');
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                const activeTab = document.getElementById(`${tabId}-tab`);
                if (activeTab) activeTab.classList.add('active');
                if (tabId === 'calendar') updateCalendar();
            });
        });
        
        // Навигация календаря
        const prevBtn = document.getElementById('prevMonthBtn');
        const nextBtn = document.getElementById('nextMonthBtn');
        
        if (prevBtn) {
            prevBtn.addEventListener('click', function(e) {
                e.preventDefault();
                currentDisplayMonth--;
                if (currentDisplayMonth < 0) {
                    currentDisplayMonth = 11;
                    currentDisplayYear--;
                }
                updateCalendar();
            });
        }
        
        if (nextBtn) {
            nextBtn.addEventListener('click', function(e) {
                e.preventDefault();
                currentDisplayMonth++;
                if (currentDisplayMonth > 11) {
                    currentDisplayMonth = 0;
                    currentDisplayYear++;
                }
                updateCalendar();
            });
        }
        
        // Переключение прошедших событий
        const toggleBtn = document.getElementById('togglePastEventsBtn');
        const pastContainer = document.getElementById('pastEventsContainer');
        
        if (toggleBtn && pastContainer) {
            toggleBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (pastContainer.classList.contains('hidden-past')) {
                    pastContainer.classList.remove('hidden-past');
                    toggleBtn.textContent = 'Скрыть прошедшие события ↑';
                } else {
                    pastContainer.classList.add('hidden-past');
                    toggleBtn.textContent = 'Показать прошедшие события ↓';
                }
            });
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    </script>
</body>
</html>
